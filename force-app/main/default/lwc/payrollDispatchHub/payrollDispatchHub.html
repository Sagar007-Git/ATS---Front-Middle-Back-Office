<template>
    <div class="saas-dispatch-workspace slds-is-relative">
        
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading Data..." size="medium" variant="brand"></lightning-spinner>
        </template>

        <header class="saas-header">
            <div class="header-left">
                <div class="header-icon">
                    <lightning-icon icon-name="standard:service_contract" size="medium"></lightning-icon>
                </div>
                <div>
                    <h2 class="header-title">History & Payments Ledger</h2>
                    <p class="header-subtitle">Track the lifecycle of dispatched Payrolls and apply payments.</p>
                </div>
            </div>
            <div class="header-right">
                <button class="saas-btn saas-btn-secondary" onclick={loadAllData}>
                    <lightning-icon icon-name="utility:refresh" size="x-small" class="slds-m-right_xx-small"></lightning-icon> Refresh Data
                </button>
            </div>
        </header>

        <div class="saas-body">
            <div class="saas-toolbar">
                <div class="toolbar-instructions">
                    <lightning-icon icon-name="utility:search" size="x-small"></lightning-icon>
                    <span class="slds-m-left_x-small">Find and manage historical Payrolls securely.</span>
                </div>
                <div class="saas-search-input">
                    <lightning-input type="search" placeholder="Search Ledger..." variant="label-hidden" onchange={handleTrackedSearch}></lightning-input>
                </div>
            </div>

            <template if:false={hasData}>
                <div class="saas-empty-state">
                    <div class="empty-state-card">
                        <lightning-icon icon-name="utility:search" size="large" class="saas-icon-muted"></lightning-icon>
                        <h3>No Records Found</h3>
                        <p>There are no historical records matching your criteria.</p>
                    </div>
                </div>
            </template>

           <template if:true={hasData}>
                <div class="saas-table-wrapper" style="border-radius: 8px 8px 0 0;">
                    <div class="saas-grid-header">
                        <div class="grid-col flex-1">Payroll #</div>
                        <div class="grid-col flex-2">Candidate Name</div>
                        <div class="grid-col flex-1 text-right">Gross Pay</div>
                        <div class="grid-col flex-1 text-center">Status</div>
                        <div class="grid-col action-col text-center">Action</div>
                    </div>

                    <div class="saas-grid-rows">
                        <template for:each={paginatedData} for:item="inv">
                            <div key={inv.Id} class="saas-grid-row">
                                <div class="grid-col flex-1 font-metric">{inv.Name}</div>
                                <div class="grid-col flex-2 client-name-col">
                                    <strong>{inv.candidateName}</strong>
                                </div>
                                <div class="grid-col flex-1 text-right font-metric text-brand">
                                    <lightning-formatted-number value={inv.totalAmount} format-style="currency"></lightning-formatted-number>
                                </div>
                                <div class="grid-col flex-1 text-center">
                                    <span class={inv.pillClass}>{inv.status}</span>
                                </div>
                                <div class="grid-col action-col text-center flex-actions">
                                    <button class="saas-action-btn neutral-btn" data-action="view_pdf" data-id={inv.Id} onclick={handleActionClick} title="View PDF Archive">
                                        <lightning-icon icon-name="utility:preview" size="x-small"></lightning-icon>
                                    </button>
                                    <button class="saas-action-btn success-btn" data-action="mark_paid" data-id={inv.Id} onclick={handleActionClick} title="Mark as Paid">
                                        <lightning-icon icon-name="utility:check" size="x-small"></lightning-icon>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="saas-pagination">
                    <div class="pagination-left">
                        <span class="pagination-record-count">{recordRangeInfo}</span>
                    </div>
                    <div class="pagination-center">
                        <span class="page-size-label">Rows per page:</span>
                        <select class="saas-page-select" onchange={handlePageSizeChange}>
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                    <div class="pagination-controls">
                        <button class="page-btn" onclick={handlePrev} disabled={isFirstPage}>Previous</button>
                        <div class="page-info">{pageInfo}</div>
                        <button class="page-btn" onclick={handleNext} disabled={isLastPage}>Next</button>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
