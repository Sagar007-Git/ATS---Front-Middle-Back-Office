<template>
    <lightning-card title="Invoice Management Hub" icon-name="standard:invoice">
        
        <div slot="actions" class="slds-grid slds-grid_vertical-align-center">
            <template if:false={isDrillDownMode}>
                <div class="slds-m-right_medium" style="width: 300px;">
                    <lightning-input 
                        type="search" 
                        placeholder="Search Clients, Projects, or Candidates..." 
                        variant="label-hidden"
                        onchange={handleSearch}
                        value={searchTerm}>
                    </lightning-input>
                </div>
            </template>
            <lightning-button label="Refresh Data" icon-name="utility:refresh" onclick={loadUnbilledData}></lightning-button>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading Data" size="medium"></lightning-spinner>
        </template>

        <div class="slds-p-around_medium">
            
            <template if:true={isDrillDownMode}>
                <div class="slds-box slds-theme_default">
                    <div class="slds-grid slds-grid_align-spread slds-p-bottom_medium">
                        <div class="slds-text-heading_medium">
                            Unbilled Records for: <strong>{drillDownTitle}</strong>
                        </div>
                        <lightning-button variant="neutral" label="Back to Dashboard" icon-name="utility:back" onclick={handleBack}></lightning-button>
                    </div>

                    <lightning-datatable
                        key-field="compositeKey" data={drillDownData}
                        columns={projectColumns}
                        onrowselection={handleRowSelection}>
                    </lightning-datatable>

                    <div class="slds-m-top_medium slds-grid slds-grid_align-spread">
                        <div>
                            <lightning-button label="Reject Time" variant="destructive-text" icon-name="utility:close" onclick={openRejectModal} disabled={isGenerateDisabled} class="slds-m-right_small"></lightning-button>
                            <lightning-button label="Approve Time" variant="success" icon-name="utility:check" onclick={handleApprove} disabled={isGenerateDisabled}></lightning-button>
                        </div>
                        <div>
                            <lightning-button label="Generate Invoices" variant="brand" icon-name="utility:money" onclick={handleGenerate} disabled={isGenerateDisabled}></lightning-button>
                        </div>
                    </div>
                </div>
            </template>

            <template if:false={isDrillDownMode}>
                <lightning-tabset variant="scoped">
                    
                    <lightning-tab label="By Project" icon-name="standard:service_territory_location">
                        <c-invoice-entity-dashboard 
                            entity-type="Project" 
                            pending-data={projectGroups} 
                            search-term={appliedSearchTerm} 
                            ondrilldown={handleDrillDown}>
                        </c-invoice-entity-dashboard>
                    </lightning-tab>

                    <lightning-tab label="By Candidate" icon-name="standard:user">
                        <c-invoice-entity-dashboard 
                            entity-type="Candidate" 
                            pending-data={candidateGroups} 
                            search-term={appliedSearchTerm} 
                            ondrilldown={handleDrillDown}>
                        </c-invoice-entity-dashboard>
                    </lightning-tab>

                    <lightning-tab label="Dispatch & Tracking" icon-name="standard:drafts">
                        <c-invoice-dispatch-hub></c-invoice-dispatch-hub>
                    </lightning-tab>

                </lightning-tabset>
            </template>
        </div>
    </lightning-card>
    <template if:true={isRejectModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_small">
                <div class="slds-modal__container">
                    <header class="slds-modal__header" style="background: #FFEEEE; border-bottom: 2px solid #BA0517;">
                        <h2 class="slds-text-heading_medium" style="color: #BA0517; font-weight: bold;">Reject Timesheets</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-m-bottom_small">These records will be unlocked and sent back to the employee's Timesheet Portal for correction.</p>
                        <lightning-textarea label="Reason for Rejection (Required)" value={rejectReason} onchange={handleRejectReasonChange} required placeholder="e.g., Please move 4 hours from Alpha to Beta project..."></lightning-textarea>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" variant="neutral" onclick={closeRejectModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Confirm Rejection" variant="destructive" onclick={confirmReject}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
</template>
