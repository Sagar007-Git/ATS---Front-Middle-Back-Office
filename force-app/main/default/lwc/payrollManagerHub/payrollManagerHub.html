<template>
    <div class="saas-billing-workspace slds-fade-in-open slds-is-relative">
        
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <div class="saas-billing-header">
            <div class="billing-header-left">
                <div class="billing-icon-box">
                    <lightning-icon icon-name="standard:file" size="medium"></lightning-icon>
                </div>
                <div>
                    <h2 class="billing-title">Master Billing Run</h2>
                    <p class="billing-subtitle">Consolidate approved time and expenses into Candidate Payrolls.</p>
                </div>
            </div>

            <div class="billing-header-controls">
                
                <div class="smart-date-wrapper">
                    <div class="quick-date-pills">
                        <button class="date-pill" data-range="lastMonth" onclick={handleQuickDate}>Last Month</button>
                        <button class="date-pill" data-range="thisMonth" onclick={handleQuickDate}>This Month</button>
                        <button class="date-pill" data-range="thisQuarter" onclick={handleQuickDate}>This Quarter</button>
                    </div>

                    <div class="date-divider"></div>

                    <div class="saas-date-picker-group">
                        <lightning-input type="date" value={payrollStartDate} onchange={handleStartChange} variant="label-hidden" class="saas-date-input" placeholder="Start Date"></lightning-input>
                        <span class="date-separator">to</span>
                        <lightning-input type="date" value={payrollEndDate} onchange={handleEndChange} variant="label-hidden" class="saas-date-input" placeholder="End Date"></lightning-input>
                    </div>
                </div>

                <button class="saas-btn saas-btn-primary pulse-on-ready" onclick={runConsolidation}>
                    <lightning-icon icon-name="utility:sync" size="x-small" class="slds-m-right_xx-small"></lightning-icon> Fetch Data
                </button>
            </div>
        </div>

        <div class="saas-billing-body">
            
            <template if:true={showInitialState}>
                <div class="saas-empty-state state-initial">
                    <div class="empty-state-card">
                        <div class="empty-state-icon-wrapper">
                            <lightning-icon icon-name="standard:event" size="large"></lightning-icon>
                        </div>
                        <h3>Ready to Consolidate</h3>
                        <p>Select a date range and click "Fetch Approved Data" to generate Workforce Payrolls.</p>
                    </div>
                </div>
            </template>

            <template if:true={showNoResultsState}>
                <div class="saas-empty-state state-no-results">
                    <div class="empty-state-card">
                        <div class="empty-state-icon-wrapper">
                            <lightning-icon icon-name="utility:search" size="large"></lightning-icon>
                        </div>
                        <h3>No Unpaid Time Found</h3>
                        <p>There are no approved timesheets for the selected date range.</p>
                    </div>
                </div>
            </template>

            <template if:true={hasPayrollData}>
                <div class="saas-grid-header">
                    <div class="grid-col checkbox-col">
                        <input type="checkbox" checked={isAllSelected} onchange={handleSelectAll} />
                    </div>
                    <div class="grid-col flex-2">Candidate / Account</div>
                    <div class="grid-col flex-1 text-center">Projects</div>
                    <div class="grid-col flex-1 text-right">Total Hours</div>
                    <div class="grid-col flex-1 text-right">Payroll Total</div>
                    <div class="grid-col action-col text-center">Action</div>
                </div>

                <div class="saas-grid-rows">
                    <template for:each={paginatedData} for:item="Candidate">
                        <div key={Candidate.candidateId} class={Candidate.rowClass}>
                            <div class="grid-col checkbox-col">
                                <input type="checkbox" checked={Candidate.selected} data-id={Candidate.candidateId} onchange={handleSelectCandidate} />
                            </div>
                            <div class="grid-col flex-2 Candidate-name-col">
                                <strong>{Candidate.candidateName}</strong>
                            </div>
                            <div class="grid-col flex-1 text-center"><span class="saas-pill pill-neutral">{Candidate.projectCount} Projects</span></div>
                            <div class="grid-col flex-1 text-right font-metric">{Candidate.totalHours} hr</div>
                            <div class="grid-col flex-1 text-right font-metric text-brand">{Candidate.totalAmountDisplay}</div>
                            <div class="grid-col action-col text-center">
                                <button class="saas-preview-btn" data-id={Candidate.candidateId} onclick={previewPDF} title="Preview PDF">
                                    <lightning-icon icon-name="utility:preview" size="x-small"></lightning-icon>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="saas-pagination">
                    <div class="pagination-left">
                        <span class="pagination-record-count">{recordRangeInfo}</span>
                    </div>
                    <div class="pagination-center">
                        <span class="page-size-label">Rows per page:</span>
                        <select class="saas-page-select" onchange={handlePageSizeChange}>
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                    <div class="pagination-controls">
                        <button class="page-btn" onclick={handlePrev} disabled={isFirstPage}>Previous</button>
                        <div class="page-info">{pageInfo}</div>
                        <button class="page-btn" onclick={handleNext} disabled={isLastPage}>Next</button>
                    </div>
                </div>
            </template>
        </div>

        <template if:true={hasSelectedCandidates}>
            <div class="saas-floating-footer slds-fade-in-open">
                <div class="footer-left">
                    <span class="footer-count">{selectedCount} Candidates Selected</span>
                    <span class="footer-meta">Will lock records and finalize payrolls.</span>
                </div>
                <div class="footer-right">
                    <button class="saas-btn saas-btn-success pulse-btn" onclick={executeFinalization}>
                        <lightning-icon icon-name="utility:lock" size="x-small" class="slds-m-right_xx-small"></lightning-icon> Generate & Dispatch Payrolls
                    </button>
                </div>
            </div>
        </template>

    </div>`
</template>
