<template>
    <div class="enterprise-shell slds-fade-in-open">
        
        <nav class="enterprise-sidebar">
            <div class="sidebar-brand">
                <div class="brand-text">
                    <h1 class="brand-title">Invoice Hub</h1>
                </div>
            </div>

            <div class="sidebar-menu">
                <div class="nav-group">
                    <h3 class="nav-label">Client Billing</h3>
                    <ul class="nav-list">
                        <li class={navInvoiceGenCss} data-id="invoice-gen" onclick={handleNavSelect}>
                            <lightning-icon icon-name="utility:collection_variable" size="x-small" class="nav-icon"></lightning-icon>
                            <span>Master Billing Run</span>
                        </li>
                        <li class={navInvoiceHistoryCss} data-id="invoice-history" onclick={handleNavSelect}>
                            <lightning-icon icon-name="utility:ledger" size="x-small" class="nav-icon"></lightning-icon>
                            <span>Accounts Receivable</span>
                        </li>
                    </ul>
                </div>

                <div class="nav-group">
                    <h3 class="nav-label">Workforce Payroll</h3>
                    <ul class="nav-list">
                        <li class={navPayrollGenCss} data-id="payroll-gen" onclick={handleNavSelect}>
                            <lightning-icon icon-name="utility:moneybag" size="x-small" class="nav-icon"></lightning-icon>
                            <span>Process Payroll</span>
                        </li>
                        <li class={navPayrollHistoryCss} data-id="payroll-history" onclick={handleNavSelect}>
                            <lightning-icon icon-name="utility:history" size="x-small" class="nav-icon"></lightning-icon>
                            <span>Payroll Ledger</span>
                        </li>
                    </ul>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot"></span> System Operational
                </div>
            </div>
        </nav>

        <main class="enterprise-workspace">
            <template lwc:if={isInvoiceGen}>
                <c-invoice-manager-hub></c-invoice-manager-hub>
            </template>
            <template lwc:elseif={isInvoiceHistory}>
                <c-invoice-dispatch-hub></c-invoice-dispatch-hub>
            </template>
            <template lwc:elseif={isPayrollGen}>
                <c-payroll-manager-hub></c-payroll-manager-hub>
            </template>
            <template lwc:elseif={isPayrollHistory}>
                <c-payroll-dispatch-hub></c-payroll-dispatch-hub>
            </template>
        </main>
        
    </div>
</template>
