<template>
    <div class="saas-layout">
        
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium" variant="brand"></lightning-spinner>
        </template>

        <header class="global-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_large">
            <div class="slds-grid slds-grid_vertical-align-center">
                <div class="logo-box">
                    <lightning-icon icon-name="standard:service_contract" size="medium"></lightning-icon>
                </div>
                <div class="slds-m-left_medium">
                    <h1 class="app-title">Timesheet Command Center</h1>
                    <p class="app-subtitle">Enterprise Resource Management</p>
                </div>
            </div>
            
            <div class="slds-grid slds-grid_vertical-align-center user-profile">
                <div class="slds-text-align_right slds-m-right_medium">
                    <p class="user-name">{managerInfo.name}</p>
                    <p class="user-role">{managerInfo.role}</p>
                </div>
                <div class="avatar-circle header-avatar">{managerInfo.initials}</div>
            </div>
        </header>

        <div class="saas-tab-container slds-m-bottom_large">
            <button class={timesheetTabClass} data-tab="timesheets" onclick={handleTabSwitch}>Time Approvals</button>
            <button class={expenseTabClass} data-tab="expenses" onclick={handleTabSwitch}>Expense Reports</button>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-icon-wrapper kpi-blue">
                    <lightning-icon icon-name={kpiIconOne} size="small"></lightning-icon>
                </div>
                <div>
                    <p class="kpi-label">{kpiTitleOne}</p>
                    <h2 class="kpi-value">{kpiValueOne}</h2>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon-wrapper kpi-purple">
                    <lightning-icon icon-name={kpiIconTwo} size="small"></lightning-icon>
                </div>
                <div>
                    <p class="kpi-label">{kpiTitleTwo}</p>
                    <h2 class="kpi-value">{kpiValueTwo} <span class="kpi-suffix">{kpiSuffixTwo}</span></h2>
                </div>
            </div>
        </div>

        <template if:true={isTimesheetTab}>
            <template if:true={projectData}>
                <div class="slds-grid slds-wrap main-container">
        
                    <div class="slds-col slds-size_1-of-4 project-sidebar">
                        <div class="sidebar-header">Projects</div>
                        <div class="slds-m-bottom_medium">
                            <lightning-combobox label="Filter by Status" value={statusFilter} options={statusFilterOptions} onchange={handleStatusFilterChange} variant="label-hidden"></lightning-combobox>
                        </div>
                        <div class="sidebar-items">
                            <template for:each={pagedProjectSidebar} for:item="p">
                                <div key={p.projectId} class={p.className} onclick={handleProjectSelect} data-projectid={p.projectId}>
                                    <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-spread slds-m-bottom_xx-small">
                                        <span class="project-nav-name slds-truncate">{p.projectName}</span>
                                        <!-- <span class="count-badge" title="Total Timesheets">{p.count}</span> -->
                                    </div>
                                    <div class="sidebar-stats slds-grid slds-grid_align-spread">
                                        <span class="stat-label">Total Hours:</span>
                                        <span class="stat-value">{p.hours}h</span>
                                    </div>
                                </div>
                            </template>
                            <template if:true={hasNoProjects}>
                                <div style="padding: 20px; text-align: center; color: #6B7280;">
                                    <p style="font-size: 13px; margin: 0;">No projects with {statusFilter} status</p>
                                </div>
                            </template>
                        </div>
                        <template if:true={projectSidebarPaginationVisible}>
                            <div class="pagination-controls">
                                <div class="slds-grid slds-grid_align-spread slds-align_absolute-center">
                                    <lightning-button label="Previous" variant="neutral" disabled={isProjectSidebarFirstPage} onclick={handleProjectSidebarPrev} size="small"></lightning-button>
                                    <span class="page-text">{projectSidebarPage} / {totalProjectSidebarPages}</span>
                                    <lightning-button label="Next" variant="neutral" disabled={isProjectSidebarLastPage} onclick={handleProjectSidebarNext} size="small"></lightning-button>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div class="slds-col slds-size_3-of-4 workspace">
                        <template if:true={activeProject}>
                            
                            <div class="workspace-header slds-grid slds-grid_vertical-align-center">
                                <div>
                                    <div class="slds-grid slds-grid_vertical-align-center">
                                        <h1 class="project-title">{activeProject.projectName}</h1>
                                        <span class="saas-pill pill-info slds-m-left_medium">Active Phase</span>
                                    </div>
                                    <p class="project-sub">{activeProject.candidates.length} resources awaiting review in this project</p>
                                </div>

                                <div class="slds-col_bump-left slds-grid slds-grid_vertical-align-center slds-gutters">
                                    <div class="slds-col" style="width: 250px;">
                                        <lightning-input type="search" variant="label-hidden" placeholder="Find resource..." value={searchQuery} onchange={handleSearch}></lightning-input>
                                    </div>
                                    <template if:true={hasPendingTimesheetEntries}>
                                        <div class="slds-col">
                                            <lightning-button label="Approve All" variant="success" icon-name="utility:check" disabled={isApproveAllDisabled} onclick={handleApproveAll}></lightning-button>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <template if:true={hasActiveCandidates}>
                                <template for:each={activeProject.candidates} for:item="cand">
                                    <div key={cand.candidateId} class="approval-card">
                                        
                                        <div class="card-header" onclick={toggleAccordion} data-candidateid={cand.candidateId}>
                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                <div class="avatar-circle">{cand.initials}</div>
                                                <div class="slds-m-left_medium">
                                                    <div class="slds-grid slds-grid_vertical-align-center">
                                                        <p class="candidate-name">{cand.candidateName}</p>
                                                        <template if:true={cand.hasPendingEntries}>
                                                            <span class="saas-pill pill-warning slds-m-left_small">Pending</span>
                                                        </template>
                                                        <template if:true={cand.isApproved}>
                                                            <span class="saas-pill pill-success slds-m-left_small">Approved</span>
                                                        </template>
                                                        <template if:true={cand.isRejected}>
                                                            <span class="saas-pill pill-danger slds-m-left_small">Rejected</span>
                                                        </template>
                                                        <template if:true={cand.isMixed}>
                                                            <span class="saas-pill pill-neutral slds-m-left_small">Mixed</span>
                                                        </template>
                                                    </div>
                                                    <p class="weekly-total">Total Logged: <strong>{cand.totalWeeklyHours}h</strong></p>
                                                </div>
                                            </div>
                                            
                                            <div class="slds-grid slds-grid_vertical-align-center" onclick={preventToggle}>
                                                <template if:true={cand.hasPendingEntries}>
                                                    <span class="exception-badge slds-m-right_medium">Requires Review</span>
                                                </template>
                                                
                                                <template if:true={cand.isApproved}>
                                                    <span class="saas-pill pill-success">Approved</span>
                                                </template>
                                                <template if:true={cand.isRejected}>
                                                    <span class="saas-pill pill-danger">Rejected</span>
                                                </template>
                                                <template if:true={cand.isMixed}>
                                                    <span class="saas-pill pill-neutral">Mixed</span>
                                                </template>
                                                
                                                <lightning-icon icon-name={cand.chevronIcon} size="x-small" class="chevron-icon"></lightning-icon>
                                            </div>
                                        </div>

                                        <template if:true={cand.isExpanded}>
                                            <div class="enterprise-timeline-container">
                                                <div class="week-selection-panel">
                                                    <h3 class="week-selection-title">Select Weeks to Approve</h3>
                                                    <template for:each={cand.weekGroups} for:item="week">
                                                        <div key={week.weekKey} class="week-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center" 
                                                            data-candidateid={cand.candidateId} data-weekkey={week.weekKey} onclick={handleWeekToggle}>
                                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                                <lightning-input type="checkbox" label={week.displayWeek} checked={week.isSelected}
                                                                    data-candidateid={cand.candidateId} data-weekkey={week.weekKey} onchange={handleWeekSelection}>
                                                                </lightning-input>
                                                                <lightning-icon icon-name={week.chevronIcon} size="x-small" class="slds-m-left_small"></lightning-icon>
                                                            </div>
                                                            <div class="week-summary slds-grid slds-grid_align-end slds-grid_vertical-align-center">
                                                                <span class="week-count">{week.entryCount} entries</span>
                                                                <span class="week-hours">{week.totalHoursFormatted}h</span>
                                                                <template if:true={week.hasPendingEntries}>
                                                                    <lightning-button label="Reject" variant="destructive" class="ghost-btn-reject slds-m-left_small"
                                                                        data-candidateid={cand.candidateId} data-weekkey={week.weekKey} onclick={handleRejectWeek}></lightning-button>
                                                                    <lightning-button label="Approve" variant="brand" class="saas-btn-approve slds-m-left_small"
                                                                        data-candidateid={cand.candidateId} data-weekkey={week.weekKey} onclick={handleApproveWeek}></lightning-button>
                                                                </template>
                                                            </div>
                                                        </div>

                                                        <template if:true={week.isExpanded}>
                                                            <div key={week.weekKey} class="week-entries-container">
                                                                <div class="timeline-header slds-grid slds-m-bottom_medium">
                                                                    <div class="slds-col slds-size_1-of-6">Date</div>
                                                                    <div class="slds-col slds-size_1-of-5">Task</div>
                                                                    <div class="slds-col slds-size_2-of-5">Work Log</div>
                                                                    <div class="slds-col slds-size_1-of-5 slds-text-align_right">Hours</div>
                                                                </div>

                                                                <template for:each={week.weekDays} for:item="day">
                                                                    <div key={day.dateKey} class="day-card slds-m-bottom_medium">
                                                                        <div class="slds-grid slds-grid_vertical-align-center slds-p-bottom_small" style="border-bottom:1px solid #E5E7EB;">
                                                                            <div class="slds-col slds-size_1-of-6">
                                                                                <div class="date-text">
                                                                                    <div class="date-day">{day.displayDay}</div>
                                                                                    <div class="date-value">{day.displayDate}</div>
                                                                                </div>
                                                                            </div>
                                                                            <div class="slds-col slds-size_5-of-6 slds-text-align_right">
                                                                                <span class="saas-pill pill-info">{day.totalDayHours}h</span>
                                                                            </div>
                                                                        </div>

                                                                        <template for:each={day.tasks} for:item="task">
                                                                            <div key={task.id} class="task-row slds-grid slds-grid_vertical-align-center slds-m-bottom_small">
                                                                                <div class="slds-col slds-size_1-of-6"></div>
                                                                                <div class="slds-col slds-size_1-of-5">
                                                                                    <span class="saas-pill pill-neutral slds-truncate" title={task.taskName}>{task.taskName}</span>
                                                                                </div>
                                                                                <div class="slds-col slds-size_2-of-5 slds-p-right_medium">
                                                                                    <div class="audit-notes">{task.notes}</div>
                                                                                </div>
                                                                                <div class="slds-col slds-size_1-of-5 slds-grid slds-grid_vertical-align-center slds-grid_align-end">
                                                                                    <!-- <template if:true={task.isOvertime}>
                                                                                        <span class="saas-pill pill-danger slds-m-right_x-small">OT</span>
                                                                                    </template> -->
                                                                                    <strong style="width:40px; text-align: right;">{task.hours}</strong>
                                                                                </div>
                                                                            </div>
                                                                        </template>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </template>
                                                </div>

                                                <div class="timeline-footer slds-m-top_medium">
                                                    <span>Total Logged Hours:</span>
                                                    <span class="footer-total">{cand.totalWeeklyHours}h</span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </template>

                            <template if:false={hasActiveCandidates}>
                                <div class="inbox-zero-state">
                                    <div class="zero-state-icon">
                                        <lightning-icon icon-name="action:approval" size="large"></lightning-icon>
                                    </div>
                                    <h2 class="zero-state-title">You're All Caught Up!</h2>
                                    <p class="zero-state-sub">There are no pending timesheets for {activeProject.projectName}. Great job keeping the queue clean.</p>
                                </div>
                            </template>

                        </template>
                    </div>
                </div>
            </template>
        </template>

        <template if:true={isExpenseTab}>
            <div class="slds-grid slds-wrap main-container">
                
                <div class="slds-col slds-size_1-of-4 project-sidebar">
                    <div class="sidebar-header">Projects Expenses</div>
                    <div class="slds-m-bottom_medium">
                        <lightning-combobox label="Filter by Status" value={statusFilter} options={statusFilterOptions} onchange={handleStatusFilterChange} variant="label-hidden"></lightning-combobox>
                    </div>
                    <template for:each={expenseSidebar} for:item="p">
                        <div key={p.projectId} class={p.className} onclick={handleExpenseProjectSelect} data-projectid={p.projectId}>
                            <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-spread slds-m-bottom_xx-small">
                                <span class="project-nav-name slds-truncate">{p.projectName}</span>
                                <span class="count-badge" title="Total Items">{p.expenseCount}</span>
                            </div>
                            <div class="sidebar-stats slds-grid slds-grid_align-spread">
                                <span class="stat-label">Total Expenses:</span>
                                <span class="stat-value">{p.formattedAmount}</span> 
                            </div>
                        </div>
                    </template>
                    <template if:true={hasNoExpenseProjects}>
                        <div style="padding: 20px; text-align: center; color: #6B7280;">
                            <p style="font-size: 13px; margin: 0;">{expenseNoResultsMessage}</p>
                        </div>
                    </template>
                </div>

                <div class="slds-col slds-size_3-of-4 workspace">
                    <!-- 🌟 EXPENSE FILTERS - Always visible -->
                    <div class="workspace-header" style="border-bottom: 1px solid #E5E7EB; padding-bottom: 16px; margin-bottom: 0;">
                        <div class="slds-grid slds-grid_vertical-align-center slds-gutters">
                            <div class="slds-col">
                                <h2 style="margin: 0; color: #374151;">Expense Filters</h2>
                            </div>
                            <div class="slds-col">
                                <lightning-input type="search" variant="label-hidden" placeholder="Find employee..." value={expenseSearchQuery} onchange={handleExpenseSearch} style="width: 200px;"></lightning-input>
                            </div>
                            <div class="slds-col">
                                <lightning-combobox label="Category" value={categoryFilter} options={categoryFilterOptions} onchange={handleCategoryFilterChange} variant="label-hidden" style="width: 140px;"></lightning-combobox>
                            </div>
                            <div class="slds-col">
                                <lightning-input type="date" label="From" value={dateFromFilter} onchange={handleDateFromFilterChange} variant="label-hidden" style="width: 120px;"></lightning-input>
                            </div>
                            <div class="slds-col">
                                <lightning-input type="date" label="To" value={dateToFilter} onchange={handleDateToFilterChange} variant="label-hidden" style="width: 120px;"></lightning-input>
                            </div>
                            <div class="slds-col">
                                <lightning-button label="Clear Filters" variant="neutral" size="small" onclick={handleClearExpenseFilters}></lightning-button>
                            </div>
                        </div>
                    </div>

                    <template if:true={activeExpenseProject}>
                        
                        <div class="workspace-header slds-grid slds-grid_vertical-align-center" style="padding-top: 16px;">
                            <div>
                                <h1 class="project-title">{activeExpenseProject.projectName}</h1>
                                <p class="project-sub">{activeExpenseProject.candidates.length} employees with pending expenses.</p>
                            </div>
                            <!-- <div class="slds-col_bump-left slds-grid slds-grid_vertical-align-center slds-gutters">
                                <template if:true={hasPendingExpenseCandidates}>
                                    <div class="slds-col">
                                        <lightning-button label="Approve Project Expenses" variant="success" icon-name="utility:check" disabled={isApproveExpenseDisabled} onclick={handleApproveProjectExpenses}></lightning-button>
                                    </div>
                                </template>
                            </div> -->
                        </div>

                        <template if:true={hasActiveExpenseCandidates}>
                            <template for:each={activeExpenseProject.candidates} for:item="cand">
                                <div key={cand.candidateId} class="approval-card">
                                    
                                    <div class="card-header" onclick={toggleExpenseAccordion} data-candidateid={cand.candidateId}>
                                        <div class="slds-grid slds-grid_vertical-align-center">
                                            <div class="avatar-circle" style="background:#059669;">{cand.initials}</div>
                                            <div class="slds-m-left_medium">
                                                <div class="slds-grid slds-grid_vertical-align-center">
                                                    <p class="candidate-name">{cand.candidateName}</p>
                                                    <span class="saas-pill pill-warning slds-m-left_small" if:true={isPendingStatus}>Review Required</span>
                                                    <span class="saas-pill pill-success slds-m-left_small" if:true={isApprovedStatus}>Approved</span>
                                                    <span class="saas-pill pill-danger slds-m-left_small" if:true={isRejectedStatus}>Rejected</span>
                                                    <span class="saas-pill pill-info slds-m-left_small" if:true={isAllStatus}>All Expenses</span>
                                                </div>
                                                <p class="weekly-total">{cand.expenses.length} submitted items</p>
                                            </div>
                                        </div>
                                        
                                        <div class="slds-grid slds-grid_vertical-align-center" onclick={preventToggle}>
                                            <h2 class="expense-total-text slds-m-right_large">${cand.totalAmount}</h2>
                                            <template if:true={cand.hasPendingExpenses}>
                                                <lightning-button label="Reject" variant="destructive" class="ghost-btn-reject slds-m-right_small"
                                                    data-candidateid={cand.candidateId} onclick={handleRejectExpense}></lightning-button>
                                                <lightning-button label="Approve All" variant="brand" class="saas-btn-approve slds-m-right_medium"
                                                    data-candidateid={cand.candidateId} onclick={handleApproveCandidateExpenses}></lightning-button>
                                            </template>
                                            <template if:true={cand.statusBadge}>
                                                <span class={cand.statusBadge.className}>{cand.statusBadge.label}</span>
                                            </template>
                                            <lightning-icon icon-name={cand.chevronIcon} size="x-small" class="chevron-icon"></lightning-icon>
                                        </div>
                                    </div>

                                    <template if:true={cand.isExpanded}>
                                        <div class="enterprise-timeline-container" style="background: #FFFFFF;">
                                            <h3 class="timeline-header" style="border:none; padding-left:0; margin-bottom: 16px;">Line Items & Receipts</h3>
                                            
                                            <template for:each={cand.expenses} for:item="exp">
                                                <div key={exp.id} class="expense-line-item slds-grid slds-m-bottom_medium">
                                                    
                                                    <div class="slds-col slds-size_1-of-2 slds-p-right_large">
                                                        <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                                                            <span class="saas-pill pill-info">{exp.category}</span>
                                                            <span class="slds-m-left_small" style="font-weight:800; color:#111827;">${exp.amount}</span>
                                                            <span class="slds-m-left_small" style="font-size:12px; color:#6B7280;">{exp.date}</span>
                                                        </div>
                                                        <p class="audit-notes" style="border-left:none; padding-left:0;">{exp.notes}</p>
                                                    </div>

                                                    <div class="slds-col slds-size_1-of-2">
                                                        <template if:true={exp.hasReceipt}>
                                                            <div class="file-attachment-card slds-grid slds-grid_vertical-align-center slds-grid_align-spread">
                                                                <div class="slds-grid slds-grid_vertical-align-center">
                                                                    <div class="file-icon">
                                                                        <lightning-icon icon-name="doctype:attachment" size="small"></lightning-icon>
                                                                    </div>
                                                                    <div class="slds-m-left_small">
                                                                        <p class="file-name slds-truncate">{exp.receiptName}</p>
                                                                    </div>
                                                                </div>
                                                                <lightning-button 
                                                                    label="View" 
                                                                    data-id={exp.documentId} 
                                                                    data-name={exp.receiptName} 
                                                                    onclick={previewFile}>
                                                                </lightning-button>
                                                            </div>
                                                        </template>
                                                        <template if:false={exp.hasReceipt}>
                                                            <span class="saas-pill pill-danger">Missing Receipt</span>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>

                                        </div>
                                    </template>
                                </div>
                            </template>
                        </template>

                        <template if:false={hasActiveExpenseCandidates}>
                            <div class="inbox-zero-state">
                                <div class="zero-state-icon">
                                    <lightning-icon icon-name="standard:expense_report" size="large"></lightning-icon>
                                </div>
                                <h2 class="zero-state-title">Budget Clear!</h2>
                                <p class="zero-state-sub">There are no pending expenses for {activeExpenseProject.projectName}.</p>
                            </div>
                        </template>

                    </template>

                    <template if:true={hasNoExpenseProjects}>
                        <div class="inbox-zero-state" style="padding: 40px; text-align: center;">
                            <div class="zero-state-icon">
                                <lightning-icon icon-name="standard:expense_report" size="large"></lightning-icon>
                            </div>
                            <h2 class="zero-state-title">No Expense Reports Found</h2>
                            <p class="zero-state-sub">{expenseNoResultsMessage}</p>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <template if:true={isRejectModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_small">
                <div class="slds-modal__container">
                    <header class="slds-modal__header" style="background: #FFF5F5;">
                        <h2 class="slds-text-heading_medium" style="color: #C53030; font-weight: 700;">Reject Timesheet</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-textarea label="Rejection Reason" value={rejectReason} onchange={handleRejectReasonChange} required></lightning-textarea>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={closeRejectModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Confirm Rejection" variant="destructive" onclick={confirmReject}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <template if:true={isDocumentPreviewModalOpen}>
            <section role="dialog" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon icon-name="utility:close" onclick={closeDocumentPreview} 
                            variant="bare-inverse" class="slds-modal__close"></lightning-button-icon>
                        <h2 class="slds-text-heading_medium">{previewDocument.receiptName}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium" style="height: 600px; background: #525659;">
                        <template if:true={isImageFile}>
                            <img src={previewDocument.fileUrl} style="display: block; margin: auto; max-height: 100%;"/>
                        </template>
                        <template if:true={isPdfFile}>
                            <iframe src={previewDocument.fileUrl} width="100%" height="100%" style="border:none;"></iframe>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Close" onclick={closeDocumentPreview}></lightning-button>
                        <lightning-button label="Download" variant="brand" onclick={downloadDocument} 
                            icon-name="utility:download" class="slds-m-left_small"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </div>
</template>
