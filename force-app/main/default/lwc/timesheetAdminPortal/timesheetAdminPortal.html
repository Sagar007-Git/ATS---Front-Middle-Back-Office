<template>
    <div class="admin-container">
        
        <header class="saas-header">
    
            <div class="saas-brand">
                <div class="saas-logo-icon">
                    <lightning-icon icon-name="standard:service_contract" size="small"></lightning-icon>
                </div>
                <h1 class="saas-title">Approval Hub</h1>
            </div>

            <div class="saas-toggle-container">
                <div class="saas-segmented-control">
                    <button class={tabTimesheetClass} onclick={setTabTimesheet}>
                        <lightning-icon icon-name="utility:clock" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                        <span>Timesheets</span>
                    </button>
                    <button class={tabExpenseClass} onclick={setTabExpense}>
                        <lightning-icon icon-name="utility:money" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                        <span>Expenses</span>
                    </button>
                </div>
            </div>

            <div class="saas-profile">
                <div class="saas-profile-text">
                    <span class="saas-profile-name">Alex Morgan</span>
                    <span class="saas-profile-role">Finance Director</span>
                </div>
                <div class="saas-avatar">
                    AM
                </div>
            </div>

        </header>

        <div class="split-workspace">
            
            <div class="saas-sidebar">
                
                <div class="saas-filter-panel">
                    <div class="saas-filter-header">
                        <lightning-icon icon-name="utility:filterList" size="x-small" class="saas-icon-muted"></lightning-icon>
                        <h3 class="saas-section-title">Refine Views</h3>
                    </div>
                    
                    <div class="saas-filter-body">
                        <div class="saas-input-group">
                            <label class="saas-label">Candidate Name</label>
                            <lightning-input 
                                type="search" 
                                variant="label-hidden" 
                                placeholder="Search resources..." 
                                onchange={handleSearchChange}>
                            </lightning-input>
                        </div>

                        <div class="saas-input-group">
                            <label class="saas-label">Workflow Status</label>
                            <lightning-combobox 
                                variant="label-hidden" 
                                value={statusFilter} 
                                options={statusOptions} 
                                onchange={handleStatusChange}>
                            </lightning-combobox>
                        </div>
                    </div>
                </div>

                <div class="saas-project-list">
                    <div class="saas-list-header">
                        <h3 class="saas-section-title">Active Projects</h3>
                        <span class="saas-badge-count">{processedProjects.length}</span>
                    </div>

                    <div class="saas-scroll-area">
                        <template if:true={isLoading}>
                            <div class="slds-p-around_medium slds-text-align_center">
                                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                            </div>
                        </template>

                        <template for:each={processedProjects} for:item="proj">
                            <div key={proj.projectId} class={proj.cardClass} data-id={proj.projectId} onclick={handleProjectSelect}>
                                <div class="saas-project-card-header">
                                    <h2 class="saas-project-name">{proj.projectName}</h2>
                                    <lightning-icon icon-name="utility:chevronright" size="x-small" class="saas-chevron"></lightning-icon>
                                </div>
                                
                                <div class="saas-project-metrics">
                                    <span class="saas-metric-pill warning">
                                        <div class="saas-dot"></div>
                                        {proj.totalPendingItems} {proj.cardLabelItems}
                                    </span>
                                    <span class="saas-metric-pill info">
                                        {proj.cardLabelValue}
                                    </span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="detail-pane">
                
                <div class="saas-kpi-container slds-m-bottom_x-large">
                    
                    <div class="saas-kpi-card">
                        <div class="saas-kpi-icon-box">
                            <lightning-icon icon-name="utility:layers" size="small"></lightning-icon>
                        </div>
                        <div class="saas-kpi-data">
                            <p class="saas-kpi-label">{globalMetrics.mainLabel}</p>
                            <p class="saas-kpi-value">{globalMetrics.mainCount}</p>
                        </div>
                    </div>

                    <div class="saas-kpi-card">
                        <div class="saas-kpi-icon-box">
                            <lightning-icon icon-name="utility:clock" size="small"></lightning-icon>
                        </div>
                        <div class="saas-kpi-data">
                            <p class="saas-kpi-label">{globalMetrics.secondaryLabel}</p>
                            <p class="saas-kpi-value">{globalMetrics.secondaryValue}</p>
                        </div>
                    </div>

                </div>

                <template if:false={activeProjectDetails}>
                    <div class="slds-text-align_center slds-p-around_xx-large slds-text-color_weak" style="margin-top: 5vh;">
                        <lightning-icon icon-name="utility:touch_action" size="large"></lightning-icon>
                        <h2 class="slds-text-heading_medium slds-m-top_medium">Select a Project</h2>
                        <p>Select a project from the directory to review submissions.</p>
                    </div>
                </template>

                <template if:true={activeProjectDetails}>
                    
                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_large slds-border_bottom slds-p-bottom_medium">
                        <div>
                            <h2 class="project-title-text">{activeProjectDetails.projectName}</h2>
                        </div>
                        
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <template if:true={isTimesheetTab}>
                                <lightning-combobox variant="label-hidden" placeholder="Filter Tasks..." value={projectTaskFilter} options={activeProjectDetails.taskOptions} onchange={handleProjectTaskFilter} class="slds-m-right_small" style="width: 220px;"></lightning-combobox>
                            </template>
                        </div>
                    </div>

                    <template for:each={activeProjectDetails.matchingResources} for:item="res">
                        <div key={res.resourceId} class="saas-candidate-card">
                            
                            <div class="saas-candidate-header" data-id={res.resourceId} onclick={handleCandidateToggle}>
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name={res.iconName} size="x-small" class="saas-chevron-muted slds-m-right_medium"></lightning-icon>
                                    
                                    <div class="saas-avatar-circle slds-m-right_small">
                                        {res.initials}
                                    </div>
                                    
                                    <div class="saas-candidate-info">
                                        <span class="saas-candidate-name">{res.candidateName}</span>
                                        <span class="saas-candidate-role">Project Resource</span>
                                    </div>
                                </div>
                                <div class="saas-header-metrics">
                                    <span class="saas-pill saas-pill-neutral">{res.displayItems.length} Records</span>
                                    <span class="saas-pill saas-pill-metric">{res.totalValueDisplay}</span>
                                </div>
                            </div>

                            <template if:true={res.isExpanded}>
                                <div class="saas-candidate-body">
                                    
                                    <template if:true={isTimesheetTab}>
                                        <div class="saas-timesheet-view">
                                            <template for:each={res.weeklyData} for:item="week">
                                                <div key={week.weekId} class="saas-week-card">
                                                    
                                                    <div class="saas-week-header" data-id={week.weekId} onclick={handleWeekToggle}>
    
                                                        <div class="saas-week-header-left">
                                                            <template if:true={week.isPending}>
                                                                <lightning-input 
                                                                    type="checkbox" 
                                                                    checked={week.isChecked}
                                                                    data-uid={week.uid}
                                                                    data-ids={week.allEntryIds}
                                                                    data-project={week.projectName}
                                                                    data-candidate={week.candidateName}
                                                                    data-itemname={week.itemLabel}
                                                                    onchange={handleCheckboxChange} 
                                                                    class="saas-checkbox">
                                                                </lightning-input>
                                                            </template>
                                                            <lightning-icon icon-name={week.iconName} size="x-small" class="saas-chevron-muted slds-m-horizontal_small"></lightning-icon>
                                                            <span class="saas-week-title">Week of {week.weekLabel}</span>
                                                        </div>
                                                        
                                                        <div class="saas-week-actions-group">
                                                            <span class={week.statusCSS}>{week.weekStatus}</span>
                                                            <span class="saas-pill saas-pill-metric">{week.weekTotalHours} hrs</span>
                                                            
                                                            <template if:true={week.isPending}>
                                                                <div class="saas-hover-actions" onclick={stopProp}>
                                                                    <button class="saas-icon-btn approve" data-type="timesheet" data-ids={week.allEntryIds} onclick={handleApprove} title="Approve">
                                                                        <lightning-icon icon-name="utility:check" size="xx-small"></lightning-icon>
                                                                    </button>
                                                                    <button class="saas-icon-btn reject" data-type="timesheet" data-ids={week.allEntryIds} onclick={handleReject} title="Reject">
                                                                        <lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon>
                                                                    </button>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>

                                                    <template if:true={week.isExpanded}>
                                                        <div class="saas-week-body">
                                                            <template for:each={week.days} for:item="day">
                                                                
                                                                <div key={day.dateId} class={day.rowClass}>
                                                                    
                                                                    <div class="saas-day-sidebar">
                                                                        <span class="saas-day-name">{day.dayLabel}</span>
                                                                    </div>
                                                                    
                                                                    <div class="saas-day-content">
                                                                        <template if:false={day.hasEntries}>
                                                                            <div class="saas-empty-state">No time recorded</div>
                                                                        </template>
                                                                        
                                                                        <template if:true={day.hasEntries}>
                                                                            <div class="saas-task-list">
                                                                                <template for:each={day.tasks} for:item="task">
                                                                                    
                                                                                    <div key={task.taskName} class="saas-task-card">
                                                                                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                                                            
                                                                                            <span class="saas-task-name">{task.taskName}</span>
                                                                                            
                                                                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                                                                <span class="saas-task-hours slds-m-right_small">{task.hours} <small>hrs</small></span>
                                                                                                
                                                                                                <template if:true={task.hasComments}>
                                                                                                    <div class="saas-note-trigger">
                                                                                                        <lightning-icon icon-name="utility:note" size="xx-small" class="saas-icon-indigo"></lightning-icon>
                                                                                                        <div class="saas-tooltip">{task.combinedComments}</div>
                                                                                                    </div>
                                                                                                </template>
                                                                                                <template if:false={task.hasComments}>
                                                                                                    <span class="saas-no-note" style="width: 28px; text-align: center;">-</span>
                                                                                                </template>
                                                                                            </div>
                                                                                            
                                                                                        </div>
                                                                                    </div>

                                                                                </template>
                                                                            </div>
                                                                            
                                                                            <div class="saas-day-footer">
                                                                                <span class="saas-day-total-label">Daily Total</span>
                                                                                <span class="saas-day-total-value">{day.dayTotalHours} <small>hrs</small></span>
                                                                            </div>
                                                                        </template>
                                                                    </div>
                                                                </div>
                                                                
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <template if:true={isExpenseTab}>
                                        <div class="saas-expense-view">
                                            <template for:each={res.weeklyData} for:item="week">
                                                
                                                <div key={week.weekId} class="saas-week-card">
                                                    
                                                    <div class="saas-week-header" data-id={week.weekId} onclick={handleWeekToggle}>
                                                        <div class="saas-week-header-left">
                                                            <template if:true={week.isPending}>
                                                                <lightning-input 
                                                                    type="checkbox" 
                                                                    checked={week.isChecked}
                                                                    data-uid={week.uid}
                                                                    data-ids={week.allEntryIds}
                                                                    data-project={activeProjectDetails.projectName}
                                                                    data-candidate={res.candidateName}
                                                                    data-itemname={week.weekLabel}
                                                                    onchange={handleCheckboxChange} 
                                                                    class="saas-checkbox">
                                                                </lightning-input>
                                                            </template>
                                                            <lightning-icon icon-name={week.iconName} size="x-small" class="saas-chevron-muted slds-m-horizontal_small"></lightning-icon>
                                                            <span class="saas-week-title">Week of {week.weekLabel}</span>
                                                        </div>
                                                        
                                                        <div class="saas-week-actions-group">
                                                            <span class={week.statusCSS}>{week.weekStatus}</span>
                                                            <span class="saas-pill saas-pill-metric">
                                                                <lightning-formatted-number value={week.weekTotalAmount} format-style="currency" currency-code="USD"></lightning-formatted-number>
                                                            </span>
                                                            
                                                            <template if:true={week.isPending}>
                                                                <div class="saas-hover-actions" onclick={stopProp}>
                                                                    <button class="saas-icon-btn approve" data-type="expense" data-ids={week.allEntryIds} onclick={handleApprove} title="Approve">
                                                                        <lightning-icon icon-name="utility:check" size="xx-small"></lightning-icon>
                                                                    </button>
                                                                    <button class="saas-icon-btn reject" data-type="expense" data-ids={week.allEntryIds} onclick={handleReject} title="Reject">
                                                                        <lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon>
                                                                    </button>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>

                                                    <template if:true={week.isExpanded}>
                                                        <div class="saas-week-body">
                                                            <template for:each={week.expenseList} for:item="exp">
                                                                <div key={exp.Id} class="saas-expense-row">
                                                                    
                                                                    <div class="saas-expense-left">
                                                                        <template if:true={exp.isPending}>
                                                                            <lightning-input 
                                                                                type="checkbox" 
                                                                                checked={exp.isChecked}
                                                                                data-uid={exp.uid}
                                                                                data-ids={exp.Id}
                                                                                data-project={exp.projectName}
                                                                                data-candidate={exp.candidateName}
                                                                                data-itemname={exp.itemLabel}
                                                                                onchange={handleCheckboxChange} 
                                                                                class="saas-checkbox slds-m-right_medium">
                                                                            </lightning-input>
                                                                        </template>
                                                                        <div class="saas-expense-date">{exp.Expense_Date__c}</div>
                                                                        <span class="saas-pill saas-pill-neutral slds-m-horizontal_medium">{exp.Category__c}</span>
                                                                        
                                                                        <template if:true={exp.hasReceipt}>
                                                                            <button class="saas-receipt-btn" data-docids={exp.receiptIds} onclick={handlePreviewReceipt}>
                                                                                <lightning-icon icon-name="utility:image" size="xx-small"></lightning-icon> View Receipt
                                                                            </button>
                                                                        </template>
                                                                    </div>

                                                                    <div class="saas-expense-right">
                                                                        <span class="saas-expense-amount">
                                                                            <lightning-formatted-number value={exp.Amount__c} format-style="currency" currency-code="USD"></lightning-formatted-number>
                                                                        </span>
                                                                        <template if:true={exp.isPending}>
                                                                            <div class="saas-hover-actions-inline" onclick={stopProp}>
                                                                                <button class="saas-icon-btn approve" data-type="expense" data-ids={exp.Id} onclick={handleApprove} title="Approve">
                                                                                    <lightning-icon icon-name="utility:check" size="xx-small"></lightning-icon>
                                                                                </button>
                                                                                <button class="saas-icon-btn reject" data-type="expense" data-ids={exp.Id} onclick={handleReject} title="Reject">
                                                                                    <lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon>
                                                                                </button>
                                                                            </div>
                                                                        </template>
                                                                    </div>
                                                                    
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </template>

                                                </div> 
                                                </template>
                                        </div>
                                    </template>

                                </div>
                            </template>
                        </div>
                    </template>

                </template>
            </div>
        </div>
    </div>
    
    <template if:true={isNotesModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={closeNotesModal}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Full Audit Notes</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p style="white-space: pre-wrap; font-size: 14px; color: #333;">{activeNotes}</p>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeNotesModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    <template if:true={isReceiptModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={closeReceiptModal}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Receipt Preview</h2>
                </header>
                
                <div class="slds-modal__content slds-p-around_medium" style="height: 65vh; background: #F1F5F9;">
                    <template if:true={receiptUrl}>
                        <iframe src={receiptUrl} width="100%" height="100%" style="border: 1px solid #CBD5E1; border-radius: 6px; background: white;"></iframe>
                    </template>
                </div>
                
                <footer class="slds-modal__footer">
                    <lightning-button label="Close Preview" onclick={closeReceiptModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    <template if:true={showBulkActionBar}>
        <div class="saas-floating-bar-container slds-fade-in-open">
            <div class="saas-floating-bar">
                
                <button class="saas-clear-btn" onclick={clearSelection} title="Clear All Selections">
                    <lightning-icon icon-name="utility:close" size="xx-small" variant="inverse"></lightning-icon>
                </button>

                <div class="saas-floating-left">
                    <span class="saas-selected-count">{globalSelectedItems.length}</span>
                    <span class="saas-selected-text">{selectedLabel}</span>
                </div>

                <button class="saas-preview-trigger" onclick={openPreviewModal}>
                    <lightning-icon icon-name="utility:preview" size="xx-small"></lightning-icon> Review Selection
                </button>

                <div class="saas-floating-right">
                    <button class="saas-bulk-btn reject" onclick={handleFloatingReject}>
                        <lightning-icon icon-name="utility:close" size="xx-small" variant="inverse" class="slds-m-right_xx-small"></lightning-icon> Reject All
                    </button>
                    <button class="saas-bulk-btn approve" onclick={handleFloatingApprove}>
                        <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse" class="slds-m-right_xx-small"></lightning-icon> Approve All
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template if:true={isPreviewModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header saas-modal-header">
                    <button class="slds-button slds-button_icon slds-modal__close" onclick={closePreviewModal}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-text-heading_medium" style="font-weight: 800;">Review Bulk Approval</h2>
                    <p class="saas-modal-subtitle">
                        {globalSelectedItems.length} {selectedLabel} Selected &bull; <strong>Total: {previewData.grandTotalDisplay}</strong>
                    </p>
                </header>
                
                <div class="slds-modal__content slds-p-around_medium saas-modal-body">
                    
                    <template if:true={previewData}>
                        <template for:each={previewData.projects} for:item="proj">
                            <div key={proj.projectName} class="saas-preview-project">
                                
                                <div class="saas-preview-proj-header">
                                    <h3 class="saas-preview-proj-title">
                                        <lightning-icon icon-name="standard:service_contract" size="small" class="slds-m-right_small"></lightning-icon> 
                                        {proj.projectName}
                                    </h3>
                                    <span class="saas-pill saas-pill-metric">{proj.projectTotalDisplay}</span>
                                </div>
                                
                                <template for:each={proj.candidates} for:item="cand">
                                    <div key={cand.candidateName} class="saas-preview-candidate">
                                        <div class="saas-preview-cand-header">
                                            <h4 class="saas-preview-cand-title">{cand.candidateName}</h4>
                                            <span class="saas-preview-cand-total">{cand.candidateTotalDisplay}</span>
                                        </div>
                                        
                                        <div class="saas-preview-items">
                                            <template for:each={cand.items} for:item="item">
                                                
                                                <div key={item.uid} class="saas-preview-item-card">
                                                    <div class="saas-preview-item-header">
                                                        <span class="saas-preview-item-title">{item.itemName}</span>
                                                        <span class="saas-preview-item-total">{item.itemTotalDisplay}</span>
                                                    </div>
                                                    
                                                    <template if:true={item.hasTasks}>
                                                        <div class="saas-preview-task-list">
                                                            <template for:each={item.taskBreakdown} for:item="task">
                                                                <span key={task.label} class="saas-pill saas-pill-task">
                                                                    {task.displayStr}
                                                                </span>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                                
                                            </template>
                                        </div>
                                    </div>
                                </template>
                                
                            </div>
                        </template>
                    </template>
                    
                </div>
                
                <footer class="slds-modal__footer saas-modal-footer">
                    <button class="saas-bulk-btn reject" onclick={handleFloatingReject}>Reject Selected</button>
                    <button class="saas-bulk-btn approve" onclick={handleFloatingApprove}>Approve Selected</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
